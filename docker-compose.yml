services:
  bot:
    build: .
    env_file: .env
    volumes:
      - /opt/hireloop/data:/app/data             # block storage — SQLite lives here
      - /opt/hireloop/output:/app/resume/output  # block storage — generated files
    restart: unless-stopped
    depends_on:
      - litestream

  litestream:
    # Pinned to 0.3.x: v0.5's compaction monitors PUT to object storage on fixed
    # timers regardless of writes (~480 req/hr idle — OCI Always-Free is 50k/mo),
    # see litestream issue #1171. v0.3 only uploads on actual WAL changes + a
    # daily snapshot → a few hundred requests/month. This config is v0.3-native.
    image: litestream/litestream:0.3.13
    # Run as root so it can write the shadow WAL next to the bot-owned (root:root) DB.
    user: "0:0"
    env_file: .env
    volumes:
      - /opt/hireloop/data:/data                 # same host dir the bot uses
      - ./litestream.yml:/etc/litestream.yml
    command: replicate
    restart: unless-stopped
