name: Deploy to OCI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: bash /opt/hireloop/app/deploy/update.sh

      - name: Verify bot is running
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: 22
          command_timeout: 2m
          script: |
            sleep 5
            docker compose -f /opt/hireloop/app/docker-compose.yml ps | grep -q "Up" \
              && echo "Bot is running" \
              || { echo "Bot failed to start"; exit 1; }
