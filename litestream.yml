dbs:
  - path: /data/hireloop.db
    replicas:
      - type: s3
        bucket: ${LITESTREAM_BUCKET}
        path: hireloop.db
        endpoint: https://${OCI_NAMESPACE}.compat.objectstorage.${LITESTREAM_REGION}.oraclecloud.com
        region: ${LITESTREAM_REGION}
        access-key-id: ${LITESTREAM_ACCESS_KEY}
        secret-access-key: ${LITESTREAM_SECRET_KEY}
        force-path-style: true

        # Low-write Telegram bot — minimize object-storage requests (OCI Always-Free
        # = 50k/mo). The daily snapshot is the backup guarantee; sync-interval only
        # ships WAL between snapshots and v0.3 only PUTs when the WAL changed, so a
        # long interval costs almost nothing. Worst-case data loss on a crash =
        # ~5 min (and never worse than the last daily snapshot).
        sync-interval: 5m
        snapshot-interval: 24h
        retention: 168h              # keep 7 daily snapshots
        retention-check-interval: 24h
